spec:
  contents:
    openapi: 3.1.0
    info:
      title: InsoBank Demo API
      version: 1.0.0
      description: |
        # Nowe API BANKU
        > Mądry cytat
        Lista:
          * Ważne
          * **bold**,
      contact:
        name: Banana
    components:
      schemas:
        Address:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            postalCode:
              type: string
            country:
              default: PL
              type: string
          required:
            - street
            - city
            - postalCode
        Account:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            customerId:
              example: 11111111-1111-4111-8111-111111111101
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            iban:
              example: PL61109010140000071219812874
              type: string
            currency:
              default: PLN
              type: string
              enum:
                - PLN
                - EUR
                - USD
            balance:
              example: 1500.5
              type: number
              minimum: 0
            status:
              default: active
              type: string
              enum:
                - active
                - frozen
            createdAt:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          required:
            - id
            - customerId
            - iban
            - currency
            - balance
            - status
            - createdAt
          additionalProperties: false
        Branch:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            name:
              example: InsoBank Warszawa Centrum
              type: string
            city:
              example: Warszawa
              type: string
            address:
              type: string
            phone:
              type: string
          required:
            - id
            - name
            - city
            - address
            - phone
          additionalProperties: false
        Customer:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            firstName:
              example: Anna
              type: string
              minLength: 1
            lastName:
              example: Kowalska
              type: string
              minLength: 1
            email:
              example: anna.kowalska@example.com
              type: string
              format: email
              pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
            pesel:
              example: "90010112345"
              type: string
            status:
              default: active
              type: string
              enum:
                - active
                - inactive
            address:
              $ref: "#/components/schemas/AddressOutput"
            createdAt:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          required:
            - id
            - firstName
            - lastName
            - email
            - pesel
            - status
            - createdAt
          additionalProperties: false
        ExchangeRate:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            base:
              type: string
              enum:
                - PLN
                - EUR
                - USD
            quote:
              type: string
              enum:
                - PLN
                - EUR
                - USD
            rate:
              example: 4.32
              type: number
              exclusiveMinimum: 0
          required:
            - id
            - base
            - quote
            - rate
          additionalProperties: false
        Product:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            name:
              example: Konto Osobiste
              type: string
            type:
              type: string
              enum:
                - account
                - card
                - deposit
            monthlyFee:
              example: 0
              type: number
              minimum: 0
            currency:
              default: PLN
              type: string
              enum:
                - PLN
                - EUR
                - USD
          required:
            - id
            - name
            - type
            - monthlyFee
            - currency
          additionalProperties: false
        Transaction:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            accountId:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            type:
              example: deposit
              type: string
              enum:
                - deposit
                - withdrawal
            amount:
              example: 100
              type: number
              exclusiveMinimum: 0
            currency:
              default: PLN
              type: string
              enum:
                - PLN
                - EUR
                - USD
            status:
              default: completed
              type: string
              enum:
                - completed
                - cancelled
            createdAt:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          required:
            - id
            - accountId
            - type
            - amount
            - currency
            - status
            - createdAt
          additionalProperties: false
        AddressOutput:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            postalCode:
              type: string
            country:
              default: PL
              type: string
          required:
            - street
            - city
            - postalCode
            - country
          additionalProperties: false
        CustomerOutput:
          type: object
          properties:
            id:
              type: string
              format: uuid
              pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
            firstName:
              example: Anna
              type: string
              minLength: 1
            lastName:
              example: Kowalska
              type: string
              minLength: 1
            email:
              example: anna.kowalska@example.com
              type: string
              format: email
              pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
            pesel:
              example: "90010112345"
              type: string
            status:
              default: active
              type: string
              enum:
                - active
                - inactive
            address:
              $ref: "#/components/schemas/AddressOutput"
            createdAt:
              type: string
              format: date-time
              pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
          required:
            - id
            - firstName
            - lastName
            - email
            - pesel
            - status
            - createdAt
          additionalProperties: false
    tags:
      - name: customers
      - name: accounts
      - name: auth
      - name: branches
      - name: products
      - name: transactions
      - name: v1
      - name: v2
    paths:
      /openapi.json:
        get:
          responses:
            "200":
              description: Default Response
      /health:
        get:
          responses:
            "200":
              description: Default Response
      /health/detailed:
        get:
          responses:
            "200":
              description: Default Response
      /accounts/:
        get:
          summary: Lista kont (koperta + paginacja)
          tags:
            - accounts
          parameters:
            - schema:
                description: Numer strony (od 1)
                example: 1
                default: 1
                type: integer
                minimum: 1
                maximum: 9007199254740991
              in: query
              name: _page
