      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountId:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
                type:
                  example: deposit
                  type: string
                  enum:
                    - deposit
                    - withdrawal
                amount:
                  example: 100
                  type: number
                  exclusiveMinimum: 0
                currency:
                  default: PLN
                  type: string
                  enum:
                    - PLN
                    - EUR
                    - USD
              required:
                - accountId
                - type
                - amount
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
