openapi: 3.1.0
info:
  title: InsoBank Demo API
  version: 1.0.0
components:
  schemas:
    Address:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          default: PL
          type: string
      required:
        - street
        - city
        - postalCode
    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        customerId:
          example: 11111111-1111-4111-8111-111111111101
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        iban:
          example: PL61109010140000071219812874
          type: string
        currency:
          default: PLN
          type: string
          enum:
            - PLN
            - EUR
            - USD
        balance:
          example: 1500.5
          type: number
          minimum: 0
        status:
          default: active
          type: string
          enum:
            - active
            - frozen
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - customerId
        - iban
        - currency
        - balance
        - status
        - createdAt
      additionalProperties: false
    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        name:
          example: InsoBank Warszawa Centrum
          type: string
        city:
          example: Warszawa
          type: string
        address:
          type: string
        phone:
          type: string
      required:
        - id
        - name
        - city
        - address
        - phone
      additionalProperties: false
    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        firstName:
          example: Anna
          type: string
          minLength: 1
        lastName:
          example: Kowalska
          type: string
          minLength: 1
        email:
          example: anna.kowalska@example.com
          type: string
          format: email
          pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
        pesel:
          example: "90010112345"
          type: string
        status:
          default: active
          type: string
          enum:
            - active
            - inactive
        address:
          $ref: "#/components/schemas/AddressOutput"
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - firstName
        - lastName
        - email
        - pesel
        - status
        - createdAt
      additionalProperties: false
    ExchangeRate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        base:
          type: string
          enum:
            - PLN
            - EUR
            - USD
        quote:
          type: string
          enum:
            - PLN
            - EUR
            - USD
        rate:
          example: 4.32
          type: number
          exclusiveMinimum: 0
      required:
        - id
        - base
        - quote
        - rate
      additionalProperties: false
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        name:
          example: Konto Osobiste
          type: string
        type:
          type: string
          enum:
            - account
            - card
            - deposit
        monthlyFee:
          example: 0
          type: number
          minimum: 0
        currency:
          default: PLN
          type: string
          enum:
            - PLN
            - EUR
            - USD
      required:
        - id
        - name
        - type
        - monthlyFee
        - currency
      additionalProperties: false
    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        accountId:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        type:
          example: deposit
          type: string
          enum:
            - deposit
            - withdrawal
        amount:
          example: 100
          type: number
          exclusiveMinimum: 0
        currency:
          default: PLN
          type: string
          enum:
            - PLN
            - EUR
            - USD
        status:
          default: completed
          type: string
          enum:
            - completed
            - cancelled
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - accountId
        - type
        - amount
        - currency
        - status
        - createdAt
      additionalProperties: false
    AddressOutput:
      type: object
      properties:
        street:
          type: string
        city:
          type: string
        postalCode:
          type: string
        country:
          default: PL
          type: string
      required:
        - street
        - city
        - postalCode
        - country
      additionalProperties: false
    CustomerOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
          pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
        firstName:
          example: Anna
          type: string
          minLength: 1
        lastName:
          example: Kowalska
          type: string
          minLength: 1
        email:
          example: anna.kowalska@example.com
          type: string
          format: email
          pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
        pesel:
          example: "90010112345"
          type: string
        status:
          default: active
          type: string
          enum:
            - active
            - inactive
        address:
          $ref: "#/components/schemas/AddressOutput"
        createdAt:
          type: string
          format: date-time
          pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      required:
        - id
        - firstName
        - lastName
        - email
        - pesel
        - status
        - createdAt
      additionalProperties: false
paths:
  /openapi.json:
    get:
      responses:
        "200":
          description: Default Response
  /health:
    get:
      responses:
        "200":
          description: Default Response
  /health/detailed:
    get:
      responses:
        "200":
          description: Default Response
  /accounts/:
    get:
      summary: Lista kont (koperta + paginacja)
      tags:
        - accounts
      parameters:
        - schema:
            description: Numer strony (od 1)
            example: 1
            default: 1
            type: integer
            minimum: 1
            maximum: 9007199254740991
          in: query
          name: _page
          description: Numer strony (od 1)
        - schema:
            description: Liczba wyników na stronę (max 100)
            example: 10
            default: 10
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: _limit
          description: Liczba wyników na stronę (max 100)
        - schema:
            description: Pole sortowania
            example: lastName
            type: string
          in: query
          name: _sort
          description: Pole sortowania
        - schema:
            description: Kierunek sortowania
            example: asc
            type: string
            enum:
              - asc
              - desc
          in: query
          name: _order
          description: Kierunek sortowania
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Lista zasobów
                    type: array
                    items:
                      $ref: "#/components/schemas/Account"
                  total:
                    description: Łączna liczba rekordów
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  page:
                    description: Bieżąca strona
                    type: integer
                    exclusiveMinimum: 0
                    maximum: 9007199254740991
                  limit:
                    description: Rozmiar strony
                    type: integer
                    exclusiveMinimum: 0
                    maximum: 9007199254740991
                  pages:
                    description: Łączna liczba stron
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                required:
                  - data
                  - total
                  - page
                  - limit
                  - pages
                additionalProperties: false
    post:
      summary: Utwórz konto
      tags:
        - accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  example: 11111111-1111-4111-8111-111111111101
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
                iban:
                  example: PL61109010140000071219812874
                  type: string
                currency:
                  default: PLN
                  type: string
                  enum:
                    - PLN
                    - EUR
                    - USD
                balance:
                  example: 1500.5
                  type: number
                  minimum: 0
              required:
                - customerId
                - iban
                - balance
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
  /accounts/{id}/:
    get:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    put:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    patch:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
    delete:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /accounts/{id}/balance:
    get:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /accounts/{id}/freeze:
    post:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /accounts/{id}/unfreeze:
    post:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /admin/reset:
    post:
      responses:
        "200":
          description: Default Response
  /auth/login:
    post:
      summary: Login → JWT
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  example: anna
                  type: string
                  minLength: 3
                password:
                  example: secret123
                  type: string
                  minLength: 4
              required:
                - username
                - password
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                required:
                  - access_token
                  - token_type
                additionalProperties: false
  /auth/refresh:
    post:
      responses:
        "200":
          description: Default Response
  /auth/logout:
    post:
      responses:
        "200":
          description: Default Response
  /auth/oauth/token:
    post:
      responses:
        "200":
          description: Default Response
  /branches/:
    get:
      summary: Lista oddziałów
      tags:
        - branches
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Branch"
                  total:
                    type: number
                required:
                  - data
                  - total
                additionalProperties: false
  /customers/:
    get:
      summary: Lista klientów (koperta + paginacja)
      tags:
        - customers
      parameters:
        - schema:
            description: Numer strony (od 1)
            example: 1
            default: 1
            type: integer
            minimum: 1
            maximum: 9007199254740991
          in: query
          name: _page
          description: Numer strony (od 1)
        - schema:
            description: Liczba wyników na stronę (max 100)
            example: 10
            default: 10
            type: integer
            minimum: 1
            maximum: 100
          in: query
          name: _limit
          description: Liczba wyników na stronę (max 100)
        - schema:
            description: Pole sortowania
            example: lastName
            type: string
          in: query
          name: _sort
          description: Pole sortowania
        - schema:
            description: Kierunek sortowania
            example: asc
            type: string
            enum:
              - asc
              - desc
          in: query
          name: _order
          description: Kierunek sortowania
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: Lista zasobów
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomerOutput"
                  total:
                    description: Łączna liczba rekordów
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                  page:
                    description: Bieżąca strona
                    type: integer
                    exclusiveMinimum: 0
                    maximum: 9007199254740991
                  limit:
                    description: Rozmiar strony
                    type: integer
                    exclusiveMinimum: 0
                    maximum: 9007199254740991
                  pages:
                    description: Łączna liczba stron
                    type: integer
                    minimum: 0
                    maximum: 9007199254740991
                required:
                  - data
                  - total
                  - page
                  - limit
                  - pages
                additionalProperties: false
    post:
      summary: Utwórz klienta
      tags:
        - customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  example: Anna
                  type: string
                  minLength: 1
                lastName:
                  example: Kowalska
                  type: string
                  minLength: 1
                email:
                  example: anna.kowalska@example.com
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                pesel:
                  example: "90010112345"
                  type: string
                status:
                  default: active
                  type: string
                  enum:
                    - active
                    - inactive
                address:
                  $ref: "#/components/schemas/Address"
              required:
                - firstName
                - lastName
                - email
                - pesel
      responses:
        "201":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerOutput"
  /customers/{id}/:
    get:
      summary: Klient po ID
      tags:
        - customers
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerOutput"
    put:
      summary: Zamień klienta
      tags:
        - customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  example: Anna
                  type: string
                  minLength: 1
                lastName:
                  example: Kowalska
                  type: string
                  minLength: 1
                email:
                  example: anna.kowalska@example.com
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                pesel:
                  example: "90010112345"
                  type: string
                status:
                  default: active
                  type: string
                  enum:
                    - active
                    - inactive
                address:
                  $ref: "#/components/schemas/Address"
              required:
                - firstName
                - lastName
                - email
                - pesel
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerOutput"
    patch:
      summary: Aktualizuj klienta
      tags:
        - customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  example: Anna
                  type: string
                  minLength: 1
                lastName:
                  example: Kowalska
                  type: string
                  minLength: 1
                email:
                  example: anna.kowalska@example.com
                  type: string
                  format: email
                  pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
                pesel:
                  example: "90010112345"
                  type: string
                status:
                  default: active
                  type: string
                  enum:
                    - active
                    - inactive
                address:
                  $ref: "#/components/schemas/Address"
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerOutput"
    delete:
      summary: Usuń klienta
      tags:
        - customers
      parameters:
        - schema:
            type: string
            format: uuid
            pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /customers/{id}/accounts/:
    get:
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
      responses:
        "200":
          description: Default Response
  /debug/crash:
    get:
      responses:
        "200":
          description: Default Response
  /debug/echo:
    get:
      responses:
        "200":
          description: Default Response
  /exchange-rates/:
    get:
      summary: Kursy walut
      tags:
        - exchange-rates
      responses:
        "200":
          description: Default Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExchangeRate"
                  total:
                    type: number
                required:
                  - data
                  - total
