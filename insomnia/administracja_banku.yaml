          modified: 1782822017213
          isPrivate: false
          description: ""
          sortKey: -1782821936427
        method: PATCH
        body:
          mimeType: application/json
          text: |-
            {
              "firstName": "Anna",
              "lastName": "Kowalska",
              "email": "anna.kowalska@example.com",
              "pesel": "90010112345",
              "status": "active",
              "address": {
                "street": "string",
                "city": "string",
                "postalCode": "string",
                "country": "PL"
              }
            }
        headers:
