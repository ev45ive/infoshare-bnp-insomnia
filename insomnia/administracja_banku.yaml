collection:
  - name: Zarządzanie klientami (customers)
    meta:
      id: fld_039469bef4f34c3482a1b1c9ea48e52b
      created: 1782821832664
      modified: 1782827072017
      sortKey: -1782821832664
      description: ""
    children:
      - url: "{{ _.base_url }}/customers/"
        name: Utwórz klienta
        meta:
          id: req_458b96aaac05496fa714456db94379f9
          created: 1782821899942
          modified: 1782827012194
          isPrivate: false
          description: ""
          sortKey: -1782821936527
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
            	"firstName": "{% faker 'randomFirstName' %}",
            	"lastName": "{% faker 'randomLastName' %}",
            	"email": "{% faker 'randomExampleEmail' %}",
            	"pesel": "{% faker 'randomInt' %}",
            	 
              "status": "{{ _.new_customer_status }}",
             

            	{% if showAddress %}
              "address": {
            		"street": "string",
            		"city": "string",
            		"postalCode": "string",
            		"country": "PL"
            	}
              {% endif %}
            }
        headers:
          - name: Content-Type
            value: application/json
        scripts:
          preRequest: >-
            const new_customer_status =
            insomnia.variables.get("new_customer_status") || 'inactive';


            insomnia.variables.localVars.set("new_customer_status",
            new_customer_status); 


            console.log('new_customer_status',new_customer_status)


            // 


            const showAddress = await insomnia.environment.replaceIn("{{
            $randomBoolean }}");


            insomnia.variables.localVars.set("showAddress", showAddress); 


            console.log("my_variable:" , showAddress);
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/customers/:id/"
        name: Aktywacja konta klienta
