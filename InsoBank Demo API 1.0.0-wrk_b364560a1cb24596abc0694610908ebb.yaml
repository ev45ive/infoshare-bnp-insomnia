spec:
  contents:
    openapi: 3.1.0
    info:
      title: InsoBank Demo API
      version: 1.0.0
      description: razdwa
      contact:
        name: banana
    components:
      schemas:
        Address:
          type: object
          properties:
            street:
              type: string
            city:
              type: string
            postalCode:
              type: string
            country:
              default: PL
              type: string
          required:
            - street
            - city
            - postalCode
        Account:
          type: object
          properties:
            id:
