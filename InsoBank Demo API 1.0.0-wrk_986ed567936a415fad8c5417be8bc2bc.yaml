    spec:
      contents:
        openapi: 3.1.0
        info:
          title: InsoBank Demo API
          version: 1.0.0
          description: |
            # Nowe API BANKU
            > Mądry cytat
            Lista:
              * Ważne
              * **bold**,
          contact:
            name: Banana
        components:
          schemas:
            Address:
              type: object
              properties:
                street:
                  type: string
                city:
                  type: string
                postalCode:
                  type: string
                country:
                  default: PL
                  type: string
              required:
                - street
                - city
                - postalCode
            Account:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
                customerId:
                  example: 11111111-1111-4111-8111-111111111101
                  type: string
                  format: uuid
                  pattern: ^([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-8][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}|00000000-0000-0000-0000-000000000000)$
                iban:
                  example: PL61109010140000071219812874
                  type: string
                currency:
                  default: PLN
                  type: string
                  enum:
                    - PLN
                    - EUR
                    - USD
                balance:
                  example: 1500.5
                  type: number
                  minimum: 0
                status:
                  default: active
                  type: string
                  enum:
                    - active
                    - frozen
                createdAt:
                  type: string
                  format: date-time
