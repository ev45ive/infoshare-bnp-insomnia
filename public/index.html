<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BNP API Explorer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; display: flex; height: 100vh; }
    aside {
      width: 240px; min-width: 200px; background: #16213e;
      border-right: 1px solid #0f3460; overflow-y: auto; padding: 12px 0;
    }
    aside h2 { font-size: 11px; color: #888; padding: 8px 16px 4px; text-transform: uppercase; letter-spacing: 1px; }
    aside button {
      display: block; width: 100%; text-align: left; padding: 7px 16px;
      background: none; border: none; color: #ccc; font: inherit; font-size: 13px;
      cursor: pointer; border-left: 3px solid transparent;
    }
    aside button:hover { background: #0f3460; color: #fff; }
    aside button.active { border-left-color: #e94560; color: #fff; background: #0f3460; }
    .method { font-size: 10px; font-weight: bold; margin-right: 6px; padding: 1px 4px; border-radius: 3px; }
    .GET    { background: #2a7a2a; color: #7fff7f; }
    .POST   { background: #7a4a00; color: #ffcf7f; }
    .PUT    { background: #004a7a; color: #7fcfff; }
    .PATCH  { background: #4a007a; color: #cf7fff; }
    .DELETE { background: #7a0000; color: #ff7f7f; }
    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #top-bar {
      background: #16213e; border-bottom: 1px solid #0f3460; padding: 10px 16px;
      display: flex; gap: 8px; align-items: center;
    }
    #method-select {
      background: #0f3460; color: #fff; border: 1px solid #444; padding: 6px 8px;
      font: inherit; border-radius: 4px; cursor: pointer;
    }
    #url-input {
      flex: 1; background: #0f3460; color: #fff; border: 1px solid #444;
      padding: 6px 10px; font: inherit; border-radius: 4px; font-size: 13px;
    }
    #send-btn {
      background: #e94560; color: #fff; border: none; padding: 6px 16px;
      font: inherit; font-weight: bold; border-radius: 4px; cursor: pointer;
    }
    #send-btn:hover { background: #c73650; }
    #auth-bar {
      background: #12192c; border-bottom: 1px solid #0f3460; padding: 6px 16px;
      display: flex; gap: 8px; align-items: center; font-size: 12px;
    }
    #auth-bar label { color: #888; }
    #token-input {
      flex: 1; background: #0f3460; color: #fff; border: 1px solid #444;
      padding: 4px 8px; font: inherit; font-size: 12px; border-radius: 4px;
    }
    #body-area { padding: 10px 16px; display: flex; gap: 10px; flex-direction: column; background: #12192c; border-bottom: 1px solid #0f3460; }
    #body-area label { font-size: 11px; color: #888; }
    #body-input {
      background: #0f3460; color: #e0e0e0; border: 1px solid #444; padding: 8px;
      font: inherit; font-size: 12px; border-radius: 4px; resize: vertical; min-height: 80px;
    }
    #response-area { flex: 1; overflow: auto; padding: 16px; }
    #status-line { font-size: 12px; margin-bottom: 8px; color: #888; }
    #status-line .ok { color: #7fff7f; }
    #status-line .err { color: #ff7f7f; }
    #response-body {
      background: #0d1117; border: 1px solid #333; border-radius: 4px;
      padding: 12px; font-size: 12px; white-space: pre-wrap; word-break: break-all;
      line-height: 1.5;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<aside>
  <h2>Auth</h2>
  <button class="active" data-method="POST" data-url="/auth/login" data-body='{"username":"alice","password":"password123"}'>
    <span class="method POST">POST</span>/auth/login
  </button>
  <button data-method="POST" data-url="/auth/register" data-body='{"username":"newuser","email":"new@example.com","password":"secret123"}'>
    <span class="method POST">POST</span>/auth/register
  </button>
  <button data-method="GET" data-url="/me">
    <span class="method GET">GET</span>/me
  </button>

  <h2>Health</h2>
  <button data-method="GET" data-url="/health">
    <span class="method GET">GET</span>/health
  </button>

  <h2>Customers</h2>
  <button data-method="GET" data-url="/customers">
    <span class="method GET">GET</span>/customers
  </button>
  <button data-method="GET" data-url="/customers/11111111-1111-4111-8111-111111111101">
    <span class="method GET">GET</span>/customers/:id
  </button>

  <h2>Accounts</h2>
  <button data-method="GET" data-url="/accounts">
    <span class="method GET">GET</span>/accounts
  </button>
  <button data-method="GET" data-url="/accounts/33333333-3333-4333-8333-333333333301">
    <span class="method GET">GET</span>/accounts/:id
  </button>

  <h2>Transactions</h2>
  <button data-method="GET" data-url="/transactions">
    <span class="method GET">GET</span>/transactions
  </button>
  <button data-method="POST" data-url="/transactions" data-body='{"fromAccountId":"33333333-3333-4333-8333-333333333301","toAccountId":"33333333-3333-4333-8333-333333333303","amount":100,"currency":"PLN","description":"Test transfer"}'>
    <span class="method POST">POST</span>/transactions
  </button>

  <h2>Exchange Rates</h2>
  <button data-method="GET" data-url="/exchange-rates">
    <span class="method GET">GET</span>/exchange-rates
  </button>

  <h2>Products</h2>
  <button data-method="GET" data-url="/products">
    <span class="method GET">GET</span>/products
  </button>

  <h2>Branches</h2>
  <button data-method="GET" data-url="/branches">
    <span class="method GET">GET</span>/branches
  </button>
</aside>

<main>
  <div id="top-bar">
    <select id="method-select">
      <option>GET</option><option>POST</option><option>PUT</option>
      <option>PATCH</option><option>DELETE</option>
    </select>
    <input id="url-input" type="text" value="/auth/login" />
    <button id="send-btn">Send</button>
  </div>
  <div id="auth-bar">
    <label>Bearer token:</label>
    <input id="token-input" type="text" placeholder="paste JWT here after login" />
  </div>
  <div id="body-area">
    <label>Request body (JSON)</label>
    <textarea id="body-input">{"username":"alice","password":"password123"}</textarea>
  </div>
  <div id="response-area">
    <div id="status-line">Press Send to make a request</div>
    <pre id="response-body"></pre>
  </div>
</main>

<script>
  const $ = id => document.getElementById(id);

  // Sidebar click → fill inputs
  document.querySelectorAll('aside button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('aside button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $('method-select').value = btn.dataset.method;
      $('url-input').value = btn.dataset.url;
      $('body-input').value = btn.dataset.body ? JSON.stringify(JSON.parse(btn.dataset.body), null, 2) : '';
      $('body-area').style.display = btn.dataset.body ? '' : 'none';
    });
    // hide body area initially if no body
    if (btn.classList.contains('active') && !btn.dataset.body) {
      $('body-area').style.display = 'none';
    }
  });

  // Method change → show/hide body
  $('method-select').addEventListener('change', () => {
    const m = $('method-select').value;
    $('body-area').style.display = ['POST','PUT','PATCH'].includes(m) ? '' : 'none';
  });

  $('send-btn').addEventListener('click', async () => {
    const method = $('method-select').value;
    const url = $('url-input').value;
    const token = $('token-input').value.trim();
    const bodyText = $('body-input').value.trim();

    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const opts = { method, headers };
    if (['POST','PUT','PATCH'].includes(method) && bodyText) {
      opts.body = bodyText;
    }

    $('status-line').textContent = 'Sending…';
    $('response-body').textContent = '';

    const t0 = Date.now();
    try {
      const res = await fetch(url, opts);
      const elapsed = Date.now() - t0;
      let text;
      try {
        const json = await res.json();
        // Auto-extract token from login response
        if (json.token) $('token-input').value = json.token;
        text = JSON.stringify(json, null, 2);
      } catch { text = await res.text(); }

      const cls = res.ok ? 'ok' : 'err';
      $('status-line').innerHTML = `<span class="${cls}">${res.status} ${res.statusText}</span> &nbsp; ${elapsed}ms`;
      $('response-body').textContent = text;
    } catch (err) {
      $('status-line').innerHTML = `<span class="err">Network error</span>`;
      $('response-body').textContent = String(err);
    }
  });
</script>
</body>
</html>
